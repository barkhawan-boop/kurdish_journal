name: Refresh journal catalog

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Harvest latest northern journal articles
        run: python harvest_ojs.py --max-records-per-source 200

      - name: Commit catalog changes
        run: |
          if git diff --quiet data/catalog.json; then
            echo "No new journal records found."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/catalog.json
          git commit -m "Refresh journal catalog"
          git push
